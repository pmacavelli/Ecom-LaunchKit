<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  
  <!-- Gold left border accent -->
  <rect x="0" y="0" width="28" height="512" rx="10" fill="#f0c14b"/>
  
  <!-- EL lettering — serif style using paths -->
  <!-- E - vertical stroke -->
  <rect x="90" y="130" width="26" height="252" rx="4" fill="#ffffff"/>
  <!-- E - top horizontal -->
  <rect x="90" y="130" width="190" height="34" rx="4" fill="#ffffff"/>
  <!-- E - middle horizontal (shorter) -->
  <rect x="90" y="243" width="148" height="28" rx="4" fill="rgba(240,193,75,0.85)"/>
  <!-- E - bottom horizontal -->
  <rect x="90" y="348" width="190" height="34" rx="4" fill="#ffffff"/>
  
  <!-- L - vertical stroke -->
  <rect x="320" y="130" width="26" height="252" rx="4" fill="#ffffff"/>
  <!-- L - bottom horizontal -->
  <rect x="320" y="348" width="130" height="34" rx="4" fill="#ffffff"/>
  
  <!-- Gold underline -->
  <rect x="90" y="420" width="360" height="16" rx="8" fill="#f0c14b"/>
  
  <!-- K superscript - top right -->
  <!-- K vertical -->
  <rect x="390" y="80" width="18" height="100" rx="3" fill="#f0c14b"/>
  <!-- K upper diagonal -->
  <path d="M408 80 L448 130" stroke="#f0c14b" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- K lower diagonal -->
  <path d="M408 130 L452 180" stroke="#f0c14b" stroke-width="18" stroke-linecap="round" fill="none"/>
</svg>